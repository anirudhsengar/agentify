# agentify:managed
name: Setup Pi
description: Install Node.js and the Pi coding agent CLI (@earendil-works/pi-coding-agent).

inputs:
  version:
    description: Exact @earendil-works/pi-coding-agent version to install.
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Install Pi
      shell: bash
      env:
        PI_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        : "${PI_VERSION:?PI_VERSION repository variable is required — see SETUP.md}"
        if [[ ! "$PI_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
          echo "PI_VERSION must be an exact version, got: $PI_VERSION" >&2
          exit 1
        fi
        npm install -g --ignore-scripts "@earendil-works/pi-coding-agent@$PI_VERSION"
