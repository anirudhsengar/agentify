version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    groups:
      runtime-deps:
        patterns:
          - "@earendil-works/*"
          - "typebox"
          - "jiti"
      dev-deps:
        patterns:
          - "typescript"
          - "@types/*"
          - "tsx"
          - "esbuild"
    # Temporary #61 bounds generate one exact build-tooling lockfile while
    # preserving the already completed #60 compiler/declaration group.
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        versions: [">=23.0.0"]
      - dependency-name: "tsx"
        versions: [">4.23.1"]
      - dependency-name: "esbuild"
        versions: [">0.28.1"]
    # agentify treats new runtime deps as gated (see AGENTS.md).
    # Let dependabot bump existing runtime deps, but require explicit
    # maintainer approval for any *new* dependency — surfaced in the
    # PR template.
    labels:
      - "dependencies"
      - "needs-triage"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
