version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    groups:
      runtime-deps:
        patterns:
          - "@earendil-works/*"
          - "typebox"
          - "jiti"
      dev-deps:
        patterns:
          - "typescript"
          - "@types/*"
          - "tsx"
    # agentify treats new runtime deps as gated (see AGENTS.md).
    # Let dependabot bump existing runtime deps, but require explicit
    # maintainer approval for any *new* dependency — surfaced in the
    # PR template.
    labels:
      - "dependencies"
      - "needs-triage"
    commit-message:
      prefix: "deps"
      include: "scope"
    # Match only the engines.node floor in package.json. Allow patch+minor
    # on runtime peers; keep major bumps as their own PRs for review.
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
