name: apply-security-policy

on:
  push:
    branches:
      - agent/security-execution-policy

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/security-execution-policy
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply exact security-policy patches
        run: node .github/scripts/apply-security-policy.mjs
      - name: Commit patched call sites
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/core/run-agentify.ts src/core/webhook/worker.ts src/core/aiw/runtime.ts src/core/orchestrator/host.ts src/core/orchestrator/agent-manager.ts
          git diff --cached --check
          git commit -m "feat(security): apply execution policies to all sessions"
          git push origin HEAD:agent/security-execution-policy
