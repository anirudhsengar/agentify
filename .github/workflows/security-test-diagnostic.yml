name: security-test-diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnostic:
    if: github.event.pull_request.head.ref == 'agent/security-execution-policy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Run tests and capture failure tail
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          npm test > test-output.log 2>&1
      - name: Prepare diagnostic artifact
        if: always()
        shell: bash
        run: |
          tail -n 300 test-output.log > failure-tail.log
      - name: Upload diagnostic artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-failure-tail
          path: failure-tail.log
          if-no-files-found: error
          retention-days: 1
      - name: Fail when tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
