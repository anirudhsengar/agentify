name: update-pi-security

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    if: github.event.pull_request.head.ref == 'agent/phase-7-release-ci-safety' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'
          cache: npm
      - run: npm ci
      - name: Upgrade paired Pi runtime packages
        run: npm install @earendil-works/pi-ai@latest @earendil-works/pi-coding-agent@latest --save
      - name: Verify production dependency security
        run: npm audit --omit=dev --audit-level=high
      - run: npm run typecheck
      - run: npm run test:all
      - name: Commit dependency upgrade
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json package-lock.json
          git diff --cached --check
          git commit -m "fix(deps): upgrade Pi runtime past security advisories"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
