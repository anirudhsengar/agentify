name: release-publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release artifact
    runs-on: ubuntu-latest
    outputs:
      tarball-filename: ${{ steps.pack.outputs.filename }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify tag matches package version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: node .github/scripts/verify-release-tag.mjs "${GITHUB_REF_NAME}"
      - name: Typecheck and tests
        run: npm test
      - name: Install packed CLI and smoke test
        run: npm run test:package
      - name: Build release tarball
        id: pack
        shell: bash
        run: |
          npm pack --json --ignore-scripts > pack-result.json

          filename="$(
            node --input-type=module <<'NODE'
            import fs from "node:fs";

            const result = JSON.parse(fs.readFileSync("pack-result.json", "utf8"));
            if (!Array.isArray(result) || result.length !== 1) {
              throw new Error(`Expected exactly one npm pack result, found ${Array.isArray(result) ? result.length : "non-array"}`);
            }

            const filename = result[0]?.filename;
            if (typeof filename !== "string" || filename.trim() === "") {
              throw new Error("npm pack result did not include a non-empty filename");
            }

            process.stdout.write(filename);
            NODE
          )"

          if [[ ! -f "$filename" ]]; then
            echo "Packed tarball does not exist: $filename" >&2
            exit 1
          fi

          printf 'filename=%s\n' "$filename" >> "$GITHUB_OUTPUT"
      - name: Upload verified tarball
        uses: actions/upload-artifact@v7
        with:
          name: npm-package-${{ github.ref_name }}
          path: ${{ steps.pack.outputs.filename }}
          if-no-files-found: error
          retention-days: 7

  publish-npm:
    name: Publish verified tarball to npm
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: npm
      url: https://www.npmjs.com/package/@anirudhsengar/agentify
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v4
        with:
          name: npm-package-${{ github.ref_name }}
          path: release-artifact
      - name: Publish exact verified artifact
        shell: bash
        run: |
          shopt -s nullglob
          tarballs=(./release-artifact/*.tgz)

          if (( ${#tarballs[@]} != 1 )); then
            echo "Expected exactly one release tarball, found ${#tarballs[@]}" >&2
            printf '%s\n' "${tarballs[@]}" >&2
            exit 1
          fi

          npm publish "${tarballs[0]}" --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: Publish GitHub release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: npm-package-${{ github.ref_name }}
          path: release-artifact
      - name: Resolve exact verified artifact
        id: release-artifact
        shell: bash
        run: |
          shopt -s nullglob
          tarballs=(./release-artifact/*.tgz)

          if (( ${#tarballs[@]} != 1 )); then
            echo "Expected exactly one release tarball, found ${#tarballs[@]}" >&2
            printf '%s\n' "${tarballs[@]}" >&2
            exit 1
          fi

          printf 'path=%s\n' "${tarballs[0]}" >> "$GITHUB_OUTPUT"
      - name: Publish release with verified artifact
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: ${{ steps.release-artifact.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
