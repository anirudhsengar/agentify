# agentify:managed
name: Validate agentify

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Run repository contract tests
        run: bash .github/scripts/validate-repository.sh
