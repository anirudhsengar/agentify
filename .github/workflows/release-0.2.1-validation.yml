name: Release 0.2.1 validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  prepare-lock:
    name: Prepare authoritative lockfile versions
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: npm
      - name: Update lockfile metadata without running scripts
        run: npm install --package-lock-only --ignore-scripts
      - name: Verify and commit lockfile metadata
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const lock = JSON.parse(fs.readFileSync("package-lock.json", "utf8"));
          if (lock.version !== "0.2.1" || lock.packages?.[""]?.version !== "0.2.1") {
            throw new Error(`package-lock version mismatch: top=${lock.version} root=${lock.packages?.[""]?.version}`);
          }
          NODE

          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json already current"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "prepare lockfile for 0.2.1"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

  validate:
    name: Full release validation (Node ${{ matrix.node }})
    needs: prepare-lock
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22.19.0", "24"]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run release:check
      - run: npm run test:parity
      - run: npm run test:maintenance
      - run: npm run test:generated-output
      - run: npm run test:security-redteam
      - name: Pack and verify inventory
        shell: bash
        run: |
          npm pack --json --ignore-scripts > pack-result.json
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const [pack] = JSON.parse(fs.readFileSync("pack-result.json", "utf8"));
          if (pack.version !== "0.2.1") throw new Error(`packed version is ${pack.version}`);
          const paths = pack.files.map((file) => file.path);
          const forbidden = paths.filter((file) =>
            file === "src" ||
            file.startsWith("src/") ||
            file === "pack-result.json" ||
            file.endsWith(".tgz") ||
            file.includes("release-artifact") ||
            file.includes("publication") ||
            file.includes(".tmp") ||
            file.includes("tmp/")
          );
          if (forbidden.length > 0) throw new Error(`forbidden packaged files: ${forbidden.join(", ")}`);
          console.log(JSON.stringify({
            filename: pack.filename,
            version: pack.version,
            size: pack.size,
            unpackedSize: pack.unpackedSize,
            shasum: pack.shasum,
            integrity: pack.integrity,
            fileCount: paths.length,
            files: paths,
          }, null, 2));
          fs.writeFileSync("package-inventory.json", JSON.stringify({ pack, paths }, null, 2));
          NODE
      - name: Install generated tarball and verify public surface
        shell: bash
        run: |
          tarball="$(node -e 'const [p]=require("./pack-result.json"); process.stdout.write(p.filename)')"
          install_dir="$(mktemp -d)"
          trap 'rm -rf "$install_dir"' EXIT
          cd "$install_dir"
          npm init -y >/dev/null
          npm install "$GITHUB_WORKSPACE/$tarball" --ignore-scripts >/dev/null
          test "$(./node_modules/.bin/agentify --version)" = "0.2.1"
          node --input-type=module <<'NODE'
          try {
            await import("agentify/dist/cli.js");
            throw new Error("deep import unexpectedly succeeded");
          } catch (error) {
            if (error?.code !== "ERR_PACKAGE_PATH_NOT_EXPORTED") throw error;
            console.log("deep import rejected with ERR_PACKAGE_PATH_NOT_EXPORTED");
          }
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: release-0.2.1-inventory-node-${{ matrix.node }}
          path: |
            pack-result.json
            package-inventory.json
            agentify-0.2.1.tgz
          if-no-files-found: error
          retention-days: 7

  npm-access:
    name: Verify npm publication ownership
    runs-on: ubuntu-latest
    environment:
      name: npm
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          registry-url: "https://registry.npmjs.org"
      - name: Verify configured account owns agentify
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          account="$(npm whoami)"
          owners="$(npm owner ls agentify)"
          echo "Authenticated npm account: $account"
          echo "Published package owners:"
          printf '%s\n' "$owners"
          if ! printf '%s\n' "$owners" | awk '{print $1}' | grep -Fxq "$account"; then
            echo "Authenticated npm account '$account' is not an owner of package 'agentify'." >&2
            exit 1
          fi
