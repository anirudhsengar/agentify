name: Dependency compatibility discovery (temporary)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: node scripts/dependency-discovery-temp.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: dependency-discovery-output
          path: dependency-discovery-output/
          if-no-files-found: error

  validate-candidate:
    name: Validate candidate (${{ matrix.group }})
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        group:
          - typescript-node-types
          - build-tooling
          - typebox
          - security-override-removal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - name: Install isolated candidate
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.group }}" in
            typescript-node-types)
              npm install --save-dev --save-exact typescript@7.0.2 @types/node@24.13.3
              ;;
            build-tooling)
              npm install --save-dev --save-exact esbuild@0.28.1 tsx@4.23.0
              ;;
            typebox)
              npm install --save --save-exact typebox@1.3.6
              ;;
            security-override-removal)
              node --input-type=module -e 'import fs from "node:fs"; const p=JSON.parse(fs.readFileSync("package.json","utf8")); delete p.overrides?.["@smithy/util-buffer-from"]; if (p.overrides && Object.keys(p.overrides).length===0) delete p.overrides; fs.writeFileSync("package.json", JSON.stringify(p,null,2)+"\n");'
              npm install
              ;;
          esac
      - name: Run group-specific characterization
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.group }}" in
            typescript-node-types)
              npm run typecheck
              npm run test:maintenance
              ;;
            build-tooling)
              npm run build
              npm run test:generation-pipeline
              npm run test:maintenance
              ;;
            typebox)
              npm run typecheck
              npm run test:unit
              ;;
            security-override-removal)
              npm run typecheck
              npm run test:security-redteam
              npm audit --omit=dev
              ;;
          esac
      - name: Record candidate tree
        if: always()
        run: npm ls --all --json > candidate-tree-${{ matrix.group }}.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-candidate-${{ matrix.group }}
          path: candidate-tree-${{ matrix.group }}.json
          if-no-files-found: error
