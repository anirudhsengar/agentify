name: Dependency compatibility discovery (temporary)

on:
  push:
    branches:
      - deps/34-discovery

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: node scripts/dependency-discovery-temp.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: dependency-discovery-output
          path: dependency-discovery-output/
          if-no-files-found: error
