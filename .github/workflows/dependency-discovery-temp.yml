name: Dependency compatibility discovery (temporary)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  registry-metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          registry-url: "https://registry.npmjs.org"
      - name: Capture versions and dates
        shell: bash
        run: |
          set -euo pipefail
          : > dependency-publication-dates.tsv
          while IFS='|' read -r package spec; do
            version=$(npm view "$spec" version)
            published=$(npm view "$package" time --json | jq -r --arg version "$version" '.[$version]')
            printf '%s\t%s\t%s\n' "$package" "$version" "$published" >> dependency-publication-dates.tsv
          done <<'EOF'
          typescript|typescript@6.0.3
          typescript-next|typescript@7.0.2
          @types/node|@types/node@22.19.21
          @types/node-next|@types/node@24.13.3
          esbuild|esbuild@0.28.1
          tsx|tsx@4.23.0
          typebox|typebox@1.3.6
          @earendil-works/pi-ai|@earendil-works/pi-ai@0.80.6
          @earendil-works/pi-coding-agent|@earendil-works/pi-coding-agent@0.80.6
          @smithy/util-buffer-from|@smithy/util-buffer-from@4.4.8
          EOF
          cat dependency-publication-dates.tsv
      - uses: actions/upload-artifact@v4
        with:
          name: dependency-publication-dates
          path: dependency-publication-dates.tsv
          if-no-files-found: error
