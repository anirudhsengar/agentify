name: Dependency compatibility discovery (temporary)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-candidate:
    name: Validate candidate (${{ matrix.group }})
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        group:
          - typescript-7-node-24
          - typescript-6-node-24
          - build-tooling
          - typebox
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - name: Install isolated candidate
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.group }}" in
            typescript-7-node-24)
              npm install --save-dev --save-exact typescript@7.0.2 @types/node@24.13.3
              ;;
            typescript-6-node-24)
              npm install --save-dev --save-exact typescript@6 @types/node@24.13.3
              ;;
            build-tooling)
              npm install --save-dev --save-exact esbuild@0.28.1 tsx@4.23.0
              ;;
            typebox)
              npm install --save --save-exact typebox@1.3.6
              ;;
          esac
      - name: Run group-specific characterization
        id: characterize
        continue-on-error: true
        shell: bash
        run: |
          set +e
          {
            case "${{ matrix.group }}" in
              typescript-7-node-24|typescript-6-node-24)
                npm run typecheck
                first=$?
                if [ "$first" -eq 0 ]; then npm run test:maintenance; fi
                ;;
              build-tooling)
                npm run build
                first=$?
                if [ "$first" -eq 0 ]; then npm run test:generation-pipeline; fi
                second=$?
                if [ "$first" -eq 0 ] && [ "$second" -eq 0 ]; then npm run test:maintenance; fi
                ;;
              typebox)
                npm run typecheck
                first=$?
                if [ "$first" -eq 0 ]; then npm run test:unit; fi
                ;;
            esac
          } > candidate-validation-${{ matrix.group }}.log 2>&1
          status=$?
          cat candidate-validation-${{ matrix.group }}.log
          echo "$status" > candidate-validation-${{ matrix.group }}.status
          exit "$status"
      - name: Record candidate tree
        if: always()
        run: npm ls --all --json > candidate-tree-${{ matrix.group }}.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-candidate-${{ matrix.group }}
          path: |
            candidate-tree-${{ matrix.group }}.json
            candidate-validation-${{ matrix.group }}.log
            candidate-validation-${{ matrix.group }}.status
          if-no-files-found: error
      - name: Fail on incompatible candidate
        if: steps.characterize.outcome == 'failure'
        run: exit 1
