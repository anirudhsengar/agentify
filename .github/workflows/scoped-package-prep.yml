name: Scoped package preparation

on:
  push:
    branches:
      - release/scoped-package-0.2.1

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Apply scoped package identity
        env:
          RELEASE_WORKFLOW_B64: WA==
          RELEASE_SAFETY_B64: WA==
        run: |
          printf '%s' '' | base64 --decode | gzip --decompress > /tmp/scoped-package-transform.mjs
          node /tmp/scoped-package-transform.mjs
          npm install --package-lock-only --ignore-scripts

          if git grep -n -E 'npm install -g agentify|npx agentify|npmjs\.com/package/agentify|node_modules/agentify|parsed\.name === "agentify"|release-artifact/agentify-\*\.tgz|path: agentify-\*\.tgz|files: release-artifact/agentify-\*\.tgz' -- ':!.github/workflows/scoped-package-prep.yml' ':!.github/workflows/scoped-package-prep-trigger.yml' ':!tests/maintenance/documentation-invariants.test.ts'; then
            echo "Found stale unscoped release references" >&2
            exit 1
          fi

          git diff --check
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          import { execFileSync } from "node:child_process";

          const files = [".github/release-drafter.yml", ".github/workflows/release-publish.yml", "CHANGELOG.md", "README.md", "docs/build-and-package.md", "docs/release-process.md", "package-lock.json", "package.json", "src/core/package-root.ts", "tests/maintenance/documentation-invariants.test.ts", "tests/package/installed-cli-smoke.mjs", "tests/release-safety.test.ts"];
          const payload = {
            baseTree: execFileSync("git", ["rev-parse", "HEAD^{tree}"], { encoding: "utf8" }).trim(),
            parent: execFileSync("git", ["rev-parse", "HEAD"], { encoding: "utf8" }).trim(),
            files: files.map((path) => ({
              path,
              mode: "100644",
              content: fs.readFileSync(path).toString("base64"),
            })),
          };
          process.stdout.write(`\n__SCOPED_TREE_PAYLOAD__${Buffer.from(JSON.stringify(payload)).toString("base64")}\n`);
          NODE
          git restore --source=HEAD -- .github/workflows/release-publish.yml
          git add .github/release-drafter.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .github/release-drafter.yml \
            CHANGELOG.md \
            README.md \
            docs/build-and-package.md \
            docs/release-process.md \
            package-lock.json \
            package.json \
            src/core/package-root.ts \
            tests/maintenance/documentation-invariants.test.ts \
            tests/package/installed-cli-smoke.mjs \
            tests/release-safety.test.ts
          git commit -m "release: publish Agentify under npm user scope"
          git push origin HEAD:release/scoped-package-0.2.1
