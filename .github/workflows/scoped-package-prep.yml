name: Scoped package preparation

on:
  push:
    branches:
      - release/scoped-package-0.2.1

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/scoped-package-0.2.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: npm
      - name: Apply scoped package identity
        shell: bash
        env:
          RELEASE_WORKFLOW_B64: ð
          RELEASE_SAFETY_B64:   
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";

          function read(path) {
            return fs.readFileSync(path, "utf8");
          }

          function write(path, content) {
            fs.writeFileSync(path, content);
          }

          function replaceOnce(path, oldText, newText) {
            const before = read(path);
            if (!before.includes(oldText)) {
              throw new Error(`Missing expected text in ${path}: ${oldText}`);
            }
            const after = before.replace(oldText, newText);
            if (after === before) throw new Error(`Replacement made no change in ${path}`);
            write(path, after);
          }

          const packageJson = JSON.parse(read("package.json"));
          packageJson.name = "@anirudhsengar/agentify";
          write("package.json", `${JSON.stringify(packageJson, null, 2)}\n`);

          write(
            ".github/workflows/release-publish.yml",
            Buffer.from(process.env.RELEASE_WORKFLOW_B64, "base64").toString("utf8"),
          );
          write(
            "tests/release-safety.test.ts",
            Buffer.from(process.env.RELEASE_SAFETY_B64, "base64").toString("utf8"),
          );

          replaceOnce(
            "README.md",
            "[![npm](https://img.shields.io/npm/v/agentify)](https://www.npmjs.com/package/agentify)",
            "[![npm](https://img.shields.io/npm/v/%40anirudhsengar%2Fagentify)](https://www.npmjs.com/package/@anirudhsengar/agentify)",
          );
          replaceOnce(
            "README.md",
            "[![license](https://img.shields.io/npm/l/agentify)](https://github.com/anirudhsengar/agentify/blob/main/LICENSE)",
            "[![license](https://img.shields.io/npm/l/%40anirudhsengar%2Fagentify)](https://github.com/anirudhsengar/agentify/blob/main/LICENSE)",
          );
          replaceOnce(
            "README.md",
            "[![node](https://img.shields.io/node/v/agentify)](https://github.com/anirudhsengar/agentify/blob/main/package.json)",
            "[![node](https://img.shields.io/node/v/%40anirudhsengar%2Fagentify)](https://github.com/anirudhsengar/agentify/blob/main/package.json)",
          );
          replaceOnce(
            "README.md",
            "npm install -g agentify\n# or run without installing:\nnpx agentify",
            "npm install -g @anirudhsengar/agentify\n# or run without installing:\nnpx @anirudhsengar/agentify",
          );
          replaceOnce(
            "README.md",
            "node_modules/agentify/packaged/skills/<name>",
            "node_modules/@anirudhsengar/agentify/packaged/skills/<name>",
          );

          replaceOnce(
            "src/core/package-root.ts",
            'return parsed.name === "agentify";',
            'return parsed.name === "@anirudhsengar/agentify";',
          );
          replaceOnce(
            "docs/build-and-package.md",
            "name is `agentify`, so the same code works when executed from source and from the",
            "name is `@anirudhsengar/agentify`, so the same code works when executed from source and from the",
          );
          replaceOnce(
            "docs/build-and-package.md",
            "The npm artifact is intentionally narrower than the repository checkout.",
            "The official npm package is `@anirudhsengar/agentify`; its installed executable remains `agentify`. The npm artifact is intentionally narrower than the repository checkout.",
          );

          replaceOnce(
            "docs/release-process.md",
            "Agentify releases are tag-driven. Manual workflow dispatch is always a\nverification run and can never publish to npm or create a GitHub release.",
            "Agentify releases are tag-driven. The official npm package is `@anirudhsengar/agentify`, while the installed executable remains `agentify`. Manual workflow dispatch is always a verification run and can never publish to npm or create a GitHub release.",
          );
          replaceOnce(
            "docs/release-process.md",
            "4. create an npm tarball;",
            "4. run `npm pack --json --ignore-scripts`, require exactly one result with a non-empty filename, and confirm that exact tarball exists;",
          );
          replaceOnce(
            "docs/release-process.md",
            "The npm job downloads and publishes the exact tarball produced by the successful\nverification job. It does not rebuild from a second checkout. npm provenance is\nrequested through GitHub's OIDC token.",
            "The verification job derives the tarball filename from `npm pack --json`, uploads that exact file, and exposes the filename as a step and job output. The npm job downloads the artifact, requires exactly one local `.tgz`, and publishes it without rebuilding or repacking. npm provenance is requested through GitHub's OIDC token.",
          );
          replaceOnce(
            "docs/release-process.md",
            "The npm environment should retain required-reviewer protection and the npm token\nshould be scoped only to this package.",
            "The npm environment should retain required-reviewer protection and the granular npm token should allow public publication of `@anirudhsengar/agentify` under the `anirudhsengar` user scope, including the required 2FA-bypass publishing permission when token-based publication requires it.",
          );

          replaceOnce(
            "CHANGELOG.md",
            "- The publication workflow now resolves exactly one downloaded `./release-artifact/agentify-*.tgz` file and publishes that explicit local path, failing closed when zero or multiple tarballs are present.",
            "- The publication workflow now resolves exactly one downloaded local `.tgz` file and publishes that explicit path, failing closed when zero or multiple tarballs are present.",
          );
          replaceOnce(
            "CHANGELOG.md",
            "- `0.2.1` contains the complete release contents intended for `0.2.0`, together with the corrected artifact-publication workflow.",
            "- `0.2.1` contains the complete release contents intended for `0.2.0`, together with the corrected artifact-publication workflow.\n- The unscoped `agentify` npm name is owned by another publisher, so the official package is now `@anirudhsengar/agentify`; the installed executable remains `agentify`.\n- Release artifact handling now derives the exact tarball filename from the single validated result returned by `npm pack --json` instead of assuming an unscoped filename.",
          );

          replaceOnce(
            "tests/package/installed-cli-smoke.mjs",
            'const packageJson = JSON.parse(fs.readFileSync(path.join(repoRoot, "package.json"), "utf-8"));',
            'const packageJson = JSON.parse(fs.readFileSync(path.join(repoRoot, "package.json"), "utf-8"));\nassert.equal(packageJson.name, "@anirudhsengar/agentify");\nassert.deepEqual(packageJson.bin, { agentify: "./bin/agentify.js" });',
          );
          replaceOnce(
            "tests/package/installed-cli-smoke.mjs",
            '  const filename = artifact?.filename;\n  assert.equal(typeof filename, "string", "npm pack result must include filename");',
            '  assert.equal(artifact?.name, packageJson.name, "npm pack must preserve the scoped package identity");\n  assert.equal(artifact?.version, packageJson.version, "npm pack must preserve the release version");\n  const filename = artifact?.filename;\n  assert.equal(typeof filename, "string", "npm pack result must include filename");\n  assert.ok(filename.trim().length > 0, "npm pack filename must be non-empty");',
          );
          replaceOnce(
            "tests/package/installed-cli-smoke.mjs",
            '  assert.ok(![...packedPaths].some((entry) => entry.startsWith("src/")), "tarball must not publish raw src/");\n  assert.ok(![...packedPaths].some((entry) => entry.includes("jiti")), "tarball must not publish jiti runtime files");',
            '  assert.ok(![...packedPaths].some((entry) => entry.startsWith("src/")), "tarball must not publish raw src/");\n  assert.ok(![...packedPaths].some((entry) => entry.includes("jiti")), "tarball must not publish jiti runtime files");\n  for (const packedPath of packedPaths) {\n    assert.ok(!packedPath.endsWith(".tgz"), `tarball must not contain nested tarballs: ${packedPath}`);\n    assert.ok(!packedPath.includes("pack-result.json"), `tarball must not contain pack metadata: ${packedPath}`);\n    assert.ok(!packedPath.includes("release-artifact"), `tarball must not contain release scratch files: ${packedPath}`);\n    assert.ok(!packedPath.includes(".tmp"), `tarball must not contain temporary files: ${packedPath}`);\n  }',
          );
          replaceOnce(
            "tests/package/installed-cli-smoke.mjs",
            '  run(npmCommand, ["install", "--ignore-scripts", "--no-audit", "--no-fund", tarballPath], { cwd: installRoot });\n\n  const bin = path.join(',
            '  run(npmCommand, ["install", "--ignore-scripts", "--no-audit", "--no-fund", tarballPath], { cwd: installRoot });\n\n  const installedPackageJsonPath = path.join(installRoot, "node_modules", "@anirudhsengar", "agentify", "package.json");\n  assert.ok(fs.existsSync(installedPackageJsonPath), "scoped package must install under node_modules/@anirudhsengar/agentify");\n  const installedPackageJson = JSON.parse(fs.readFileSync(installedPackageJsonPath, "utf-8"));\n  assert.equal(installedPackageJson.name, packageJson.name);\n  assert.equal(installedPackageJson.version, packageJson.version);\n  assert.deepEqual(installedPackageJson.bin, { agentify: "./bin/agentify.js" });\n  assert.ok(!fs.existsSync(path.join(installRoot, "node_modules", "agentify")), "unscoped agentify package must not be installed");\n\n  const bin = path.join(',
          );
          replaceOnce(
            "tests/package/installed-cli-smoke.mjs",
            '["--input-type=module", "--eval", `import(\'agentify/src/core/${internalPath}\')`],',
            '["--input-type=module", "--eval", `import(\'${packageJson.name}/src/core/${internalPath}\')`],',
          );
          replaceOnce(
            "tests/package/installed-cli-smoke.mjs",
            '/ERR_PACKAGE_PATH_NOT_EXPORTED|Cannot find package/,',
            '/ERR_PACKAGE_PATH_NOT_EXPORTED/,',
          );
          replaceOnce(
            "tests/package/installed-cli-smoke.mjs",
            'console.log(`installed compiled package smoke test passed (${packageJson.version}).`);',
            'console.log(`installed compiled package smoke test passed (${packageJson.name}@${packageJson.version}).`);',
          );

          replaceOnce(
            "tests/maintenance/documentation-invariants.test.ts",
            'test("binary and scripts preserve the compiled package boundary", () => {',
            'test("official npm package identity remains scoped while the CLI command stays stable", () => {\n  const packageJson = readPackageJson();\n  const readme = read("README.md");\n  const releaseWorkflow = read(".github/workflows/release-publish.yml");\n\n  assert.equal(packageJson.name, "@anirudhsengar/agentify");\n  assert.deepEqual(packageJson.bin, { agentify: "./bin/agentify.js" });\n  assert.match(readme, /npm install -g @anirudhsengar\\/agentify/);\n  assert.match(readme, /npx @anirudhsengar\\/agentify/);\n  assert.match(readme, /https:\\/\\/www\\.npmjs\\.com\\/package\\/@anirudhsengar\\/agentify/);\n  assert.doesNotMatch(readme, /npm install -g agentify|npx agentify/);\n  assert.match(releaseWorkflow, /https:\\/\\/www\\.npmjs\\.com\\/package\\/@anirudhsengar\\/agentify/);\n});\n\ntest("binary and scripts preserve the compiled package boundary", () => {',
          );
          NODE

          npm install --package-lock-only --ignore-scripts

          if git grep -n -E 'npm install -g agentify|npx agentify|npmjs\.com/package/agentify|node_modules/agentify|parsed\.name === "agentify"|release-artifact/agentify-\*\.tgz|path: agentify-\*\.tgz|files: release-artifact/agentify-\*\.tgz'; then
            echo "Found stale unscoped release references" >&2
            exit 1
          fi

          git diff --check
      - name: Commit scoped package changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .github/workflows/release-publish.yml \
            CHANGELOG.md \
            README.md \
            docs/build-and-package.md \
            docs/release-process.md \
            package-lock.json \
            package.json \
            src/core/package-root.ts \
            tests/maintenance/documentation-invariants.test.ts \
            tests/package/installed-cli-smoke.mjs \
            tests/release-safety.test.ts
          git commit -m "release: publish Agentify under npm user scope"
          git push origin HEAD:release/scoped-package-0.2.1
