name: dependency-audit-diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnostic:
    if: github.event.pull_request.head.ref == 'agent/phase-7-release-ci-safety'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'
          cache: npm
      - run: npm ci
      - name: Capture production audit JSON
        continue-on-error: true
        run: npm audit --omit=dev --json > npm-audit.json
      - uses: actions/upload-artifact@v4
        with:
          name: npm-production-audit
          path: npm-audit.json
          if-no-files-found: error
          retention-days: 1
