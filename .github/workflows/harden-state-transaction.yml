name: harden-state-transaction

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/phase-5-state-transactions' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: node .github/scripts/harden-state-transaction.mjs
      - run: npx tsc --noEmit
      - run: npx tsx tests/core/state-transaction.test.ts
      - run: npx tsx tests/core/state-transaction-commit-recovery.test.ts
      - name: Commit hardened transaction boundaries
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/core/state-transaction.ts src/core/run-agentify.ts
          git diff --cached --check
          git commit -m "fix(state): harden transaction crash boundaries"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
