name: apply-product-boundary

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/phase-8-product-boundary-main' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'
          cache: npm
      - run: npm ci
      - name: Apply product boundary
        id: apply
        continue-on-error: true
        run: node .github/scripts/apply-product-boundary.mjs > product-boundary.log 2>&1
      - name: Validate focused boundary
        id: validate
        if: steps.apply.outcome == 'success'
        continue-on-error: true
        run: |
          set +e
          npm run typecheck > boundary-typecheck.log 2>&1
          typecheck_status=$?
          npx tsx tests/product-boundary.test.ts > boundary-test.log 2>&1
          boundary_status=$?
          npm run test:package > boundary-package.log 2>&1
          package_status=$?
          printf 'typecheck=%s\nboundary=%s\npackage=%s\n' "$typecheck_status" "$boundary_status" "$package_status" > boundary-status.log
          if [ "$typecheck_status" -ne 0 ] || [ "$boundary_status" -ne 0 ] || [ "$package_status" -ne 0 ]; then
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: product-boundary-diagnostics
          path: |
            product-boundary.log
            boundary-status.log
            boundary-typecheck.log
            boundary-test.log
            boundary-package.log
          if-no-files-found: warn
          retention-days: 1
      - name: Stop on patch failure
        if: steps.apply.outcome == 'failure'
        run: exit 1
      - name: Stop on validation failure
        if: steps.validate.outcome == 'failure'
        run: exit 1
      - name: Commit product boundary
        id: commit
        continue-on-error: true
        run: |
          set +e
          {
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git status --short
            git add package.json README.md docs/experimental-surfaces.md src/core/aiw/index.ts tests/product-boundary.test.ts
            git diff --cached --check
            git diff --cached --stat
            git commit -m "docs: enforce supported product boundary"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          } > boundary-commit.log 2>&1
          exit $?
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: product-boundary-commit-diagnostics
          path: boundary-commit.log
          if-no-files-found: warn
          retention-days: 1
      - name: Stop on commit failure
        if: steps.commit.outcome == 'failure'
        run: exit 1
