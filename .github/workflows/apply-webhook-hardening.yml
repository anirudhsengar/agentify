name: apply-webhook-hardening

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/phase-6-webhook-http-hardening' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: node .github/scripts/apply-webhook-hardening.mjs
      - run: node .github/scripts/adjust-webhook-hardening-tests.mjs
      - run: npx tsc --noEmit
      - run: npx tsx tests/webhook/http-hardening.test.ts
      - run: npx tsx tests/webhook/server.test.ts
      - name: Commit webhook hardening
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/core/webhook/server.ts src/core/webhook/state.ts tests/webhook/server.test.ts
          git diff --cached --check
          git commit -m "feat(webhook): harden HTTP trust boundary"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
