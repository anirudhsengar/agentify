name: Refactor 24 Apply

on:
  push:
    branches:
      - refactor/24-generation-pipeline

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - name: Apply extraction
        run: node scripts/apply-refactor-24.mjs
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Generation pipeline tests
        run: npm run test:generation-pipeline
      - name: Focused extraction tests
        run: npx tsx tests/core/generation-pipeline-extraction.test.ts && npx tsx tests/core/generation-module-ownership.test.ts
      - name: Complete tests
        run: npm run test:all
      - name: Package tests
        run: npm run test:package
      - name: Parity tests
        run: npm run test:parity
      - name: Security red-team tests
        run: npm run test:security-redteam
      - name: Commit validated extraction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "refactor: extract generation pipeline"
          git push origin HEAD:refactor/24-generation-pipeline
