name: issue-51-schema-move

on:
  push:
    branches:
      - migration/51-audit-surface-schemas

permissions:
  contents: write

jobs:
  move-schema-domains:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: migration/51-audit-surface-schemas
          fetch-depth: 0
      - name: Replace declarations with module imports
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("src/core/audit/schema.ts")
          source = path.read_text()

          anchor = 'import { TypeContractSurfaceSchema } from "./schema/type-contract.ts";\n'
          imports = (
              anchor
              + 'import { OperationalSurfaceSchema } from "./schema/operational-surface.ts";\n'
              + 'import { SecuritySurfaceSchema } from "./schema/security-surface.ts";\n'
              + 'import { ValidationSurfaceSchema } from "./schema/validation-surface.ts";\n'
          )
          if imports not in source:
              if anchor not in source:
                  raise SystemExit("schema import anchor not found")
              source = source.replace(anchor, imports, 1)

          start_marker = (
              "// ============================================================================\n"
              "// D6 Validation Surface (Phase 2.9f — extended)\n"
              "// ============================================================================\n"
          )
          end_marker = (
              "// ============================================================================\n"
              "// Custom-tool and skill candidate derivation\n"
              "// ============================================================================\n"
          )
          start = source.find(start_marker)
          end = source.find(end_marker)
          if start == -1 or end == -1 or end <= start:
              raise SystemExit("schema domain block markers not found")

          source = source[:start] + end_marker + source[end + len(end_marker):]
          path.write_text(source)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/core/audit/schema.ts
          git commit -m "refactor: import audit surface schemas"
          git push origin HEAD:migration/51-audit-surface-schemas
