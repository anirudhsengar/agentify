name: Refactor 25 Apply

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    if: github.head_ref == 'refactor/25-run-orchestration' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/25-run-orchestration
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - run: npm ci
      - name: Apply orchestration extraction
        run: |
          node scripts/apply-refactor-25.mjs
          node scripts/fix-refactor-25.mjs
      - name: Typecheck extracted modules
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            {
              echo '### Issue #25 extraction typecheck'
              echo
              echo '```text'
              cat typecheck.log
              echo '```'
            } > comment.md
            gh pr comment 40 --body-file comment.md
          fi
          exit "$status"
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Run lifecycle characterization
        run: npx tsx tests/core/run-orchestration-characterization.test.ts
      - name: Commit extracted orchestration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/core/run-agentify.ts src/core/revert.ts src/core/runs
          git diff --cached --check
          git commit -m "refactor: split run mode orchestration"
          git push origin HEAD:refactor/25-run-orchestration
