name: Refactor 25 Validation

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  characterize:
    if: github.head_ref == 'refactor/25-run-orchestration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - run: npm ci
      - name: Run focused characterization
        shell: bash
        run: |
          set +e
          npx tsx tests/core/run-orchestration-characterization.test.ts > characterization.log 2>&1
          status=$?
          {
            echo '### Issue #25 characterization diagnostic'
            echo
            echo '```text'
            cat characterization.log
            echo '```'
          } > comment.md
          gh pr comment 40 --body-file comment.md
          exit "$status"
        env:
          GH_TOKEN: ${{ github.token }}
