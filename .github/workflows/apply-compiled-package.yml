name: apply-compiled-package

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/phase-9-compiled-package' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'
          cache: npm
      - run: npm ci
      - name: Apply compiled package metadata
        run: node .github/scripts/apply-compiled-package.mjs
      - name: Synchronize lockfile
        run: npm install --package-lock-only --ignore-scripts
      - name: Verify clean dependency install
        run: npm ci
      - name: Build compiled runtime
        run: npm run build
      - name: Validate compiled package configuration
        run: npx tsx tests/package/compiled-package-config.test.ts
      - name: Typecheck
        run: npm run typecheck
      - name: Full test suite
        run: npm run test:all
      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high
      - name: Install packed compiled CLI
        run: npm run test:package
      - name: Commit compiled package migration
        id: commit
        continue-on-error: true
        run: |
          set +e
          {
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git status --short
            git add package.json package-lock.json .github/workflows/release-publish.yml docs/README.md docs/experimental-surfaces.md
            git diff --cached --check
            git diff --cached --stat
            git commit -m "build: publish compiled JavaScript runtime"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          } > compiled-package-commit.log 2>&1
          exit $?
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compiled-package-commit-diagnostics
          path: compiled-package-commit.log
          if-no-files-found: warn
          retention-days: 1
      - name: Stop on commit failure
        if: steps.commit.outcome == 'failure'
        run: exit 1
