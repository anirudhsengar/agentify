          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import json

          def replace(path: str, old: str, new: str, count: int = 1) -> None:
              target = Path(path)
              text = target.read_text()
              if old not in text:
                  raise SystemExit(f"missing replacement anchor in {path}: {old[:120]!r}")
              target.write_text(text.replace(old, new, count))

          # Production consumer: only the relative source path changes.
          replace(
              "src/core/orchestrator/worker.ts",
              'import { ComsPeer } from "../coms/server.ts";',
              'import { ComsPeer } from "./comms/server.ts";',
