          replace(registry_test, "// tests/coms/registry.test.ts", "// tests/orchestrator/comms/registry.test.ts")
          replace(registry_test, 'import * as path from "node:path";\n', 'import * as path from "node:path";\nimport { fileURLToPath } from "node:url";\n')
