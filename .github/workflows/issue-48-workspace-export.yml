          )
          replace(
              registry_test,
              'async function testListPrunesDeadPids(): Promise<void> {',
              '''async function testRegistryPersistsPrivateAtomicRecord(): Promise<void> {
  const dir = tempDir("agentify-registry-private-");
  try {
    const reg = new PeerRegistry({ registryDir: dir });
    const entry = peerEntry({ name: "private-peer", project: reg.project });
    reg.upsert(entry);

    const agentsDirPath = path.join(dir, "projects", reg.project, "agents");
    const finalPath = path.join(agentsDirPath, "private-peer.json");
    const persisted = JSON.parse(fs.readFileSync(finalPath, "utf-8")) as PeerEntry;

    assert.deepEqual(persisted, entry);
    assert.deepEqual(
      Object.keys(persisted).sort(),
      [...contractFixture.registry_record_fields].sort(),
    );
    assert.equal(fs.existsSync(`${finalPath}.tmp`), false);

    if (process.platform !== "win32") {
      assert.equal(fs.statSync(agentsDirPath).mode & 0o777, 0o700);
      assert.equal(fs.statSync(finalPath).mode & 0o777, 0o600);
    }
  } finally {
    fs.rmSync(dir, { recursive: true, force: true });
  }
}

