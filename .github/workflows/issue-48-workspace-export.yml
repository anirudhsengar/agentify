async function testCloseRejectsPendingWait(): Promise<void> {
  const comsRoot = tempDir("agentify-coms-close-pending-");
  try {
    const sender = await newPeer(comsRoot, "sender", "session-close-sender");
    const receiver = await newPeer(comsRoot, "receiver", "session-close-receiver");
    receiver.on("prompt", () => undefined);

    const pending = sender.send("receiver", "wait forever");
    const waiting = sender.await(pending.msg_id, 5_000);
    await sender.close();
    const result = await waiting;

    assert.equal(result.status, "error");
    assert.equal(result.error, "peer closed");
    assert.equal(result.errorCode, "delivery_failed");
    await receiver.close();
  } finally {
    fs.rmSync(comsRoot, { recursive: true, force: true });
  }
}

async function testStaleSocketSymlinkCleanupDoesNotDeleteTarget(): Promise<void> {
  if (process.platform === "win32") return;

  const comsRoot = tempDir("agentify-coms-symlink-");
  try {
    const socketsDir = path.join(comsRoot, "sockets");
    fs.mkdirSync(socketsDir, { recursive: true });
    const victimPath = path.join(comsRoot, "victim.txt");
    const socketPath = path.join(socketsDir, "session-symlink.sock");
    fs.writeFileSync(victimPath, "keep");
    fs.symlinkSync(victimPath, socketPath);

    const peer = new ComsPeer({
      name: "symlink-peer",
      sessionId: "session-symlink",
      cwd: "/tmp",
      comsRoot,
      project: "test-project-1234",
    });
    await peer.listen();

    assert.equal(fs.readFileSync(victimPath, "utf-8"), "keep");
    assert.equal(fs.lstatSync(socketPath).isSocket(), true);
    await peer.close();
    assert.equal(fs.readFileSync(victimPath, "utf-8"), "keep");
  } finally {
    fs.rmSync(comsRoot, { recursive: true, force: true });
  }
}

