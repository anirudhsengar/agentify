name: Issue 28 diagnostics

on:
  push:
    branches:
      - refactor/28-write-map-modules

permissions:
  contents: read

jobs:
  test-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: npm
      - run: npm ci
      - name: Run full suite and capture output
        shell: bash
        run: |
          set +e
          npm run test:all > issue28-test.log 2>&1
          status=$?
          echo "$status" > issue28-status.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: issue28-test-log
          path: |
            issue28-test.log
            issue28-status.txt
      - name: Preserve test conclusion
        shell: bash
        run: exit "$(cat issue28-status.txt)"
