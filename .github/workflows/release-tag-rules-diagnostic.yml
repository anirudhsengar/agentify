name: Inspect release tag protection

on:
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  inspect:
    runs-on: ubuntu-24.04
    env:
      TEMP_BRANCH: tmp-release-tag-rules
      PR_NUMBER: ${{ github.event.pull_request.number }}
      TAG_API_TOKEN: ${{ secrets.AGENT_PAT }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Fetch active repository rules and tag protections
        shell: bash
        run: |
          set -euo pipefail
          auth=(-H 'Accept: application/vnd.github+json' -H "Authorization: Bearer ${TAG_API_TOKEN}" -H 'X-GitHub-Api-Version: 2022-11-28')
          rulesets_code=$(curl -sS -o rulesets.json -w '%{http_code}' "${auth[@]}" "https://api.github.com/repos/${GITHUB_REPOSITORY}/rulesets?includes_parents=true" || true)
          protections_code=$(curl -sS -o tag-protections.json -w '%{http_code}' "${auth[@]}" "https://api.github.com/repos/${GITHUB_REPOSITORY}/tags/protection" || true)
          echo "rulesets_http=${rulesets_code}" > tag-rule-status.txt
          echo "legacy_tag_protections_http=${protections_code}" >> tag-rule-status.txt
          if [ "$rulesets_code" = 200 ]; then
            jq '[.[] | {id,name,target,enforcement,source_type,source}]' rulesets.json > rulesets-summary.json
            : > ruleset-details.jsonl
            for id in $(jq -r '.[].id' rulesets.json); do
              code=$(curl -sS -o "ruleset-${id}.json" -w '%{http_code}' "${auth[@]}" "https://api.github.com/repos/${GITHUB_REPOSITORY}/rulesets/${id}" || true)
              echo "ruleset_${id}_http=${code}" >> tag-rule-status.txt
              if [ "$code" = 200 ]; then jq -c . "ruleset-${id}.json" >> ruleset-details.jsonl; fi
            done
          else
            cp rulesets.json rulesets-summary.json
            : > ruleset-details.jsonl
          fi
          cat tag-rule-status.txt
          cat rulesets-summary.json
          cat tag-protections.json

      - name: Upload tag rule report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-tag-rules
          path: |
            tag-rule-status.txt
            rulesets-summary.json
            ruleset-details.jsonl
            tag-protections.json
          if-no-files-found: error
          retention-days: 7

      - name: Remove temporary PR and diagnostic ref
        if: always()
        shell: bash
        run: |
          set +e
          gh api --method PATCH "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" -f state=closed
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${TEMP_BRANCH}"
