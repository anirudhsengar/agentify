name: Scoped package release validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Full scoped-package validation (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22.19.0", "24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Release check
        run: npm run release:check
      - name: Parity tests
        run: npm run test:parity
      - name: Maintenance tests
        run: npm run test:maintenance
      - name: Generated-output tests
        run: npm run test:generated-output
      - name: Security red-team tests
        run: npm run test:security-redteam
      - name: Pack and verify scoped package inventory
        id: pack
        shell: bash
        run: |
          npm pack --json --ignore-scripts > pack-result.json
          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const result = JSON.parse(fs.readFileSync("pack-result.json", "utf8"));
          if (!Array.isArray(result) || result.length !== 1) {
            throw new Error(`Expected exactly one npm pack result, found ${Array.isArray(result) ? result.length : "non-array"}`);
          }

          const artifact = result[0];
          if (artifact.name !== "@anirudhsengar/agentify") {
            throw new Error(`Unexpected packed package name: ${artifact.name}`);
          }
          if (artifact.version !== "0.2.1") {
            throw new Error(`Unexpected packed package version: ${artifact.version}`);
          }
          if (typeof artifact.filename !== "string" || artifact.filename.trim() === "") {
            throw new Error("npm pack did not return a non-empty filename");
          }
          if (!fs.existsSync(artifact.filename)) {
            throw new Error(`Packed tarball does not exist: ${artifact.filename}`);
          }

          const paths = (artifact.files ?? []).map((entry) => entry.path);
          const forbidden = paths.filter((entry) =>
            entry === "src" ||
            entry.startsWith("src/") ||
            entry.endsWith(".tgz") ||
            entry.includes("pack-result.json") ||
            entry.includes("release-artifact") ||
            entry.includes("publication") ||
            entry.includes(".tmp") ||
            entry.includes("tmp/")
          );
          if (forbidden.length > 0) {
            throw new Error(`Forbidden packaged files: ${forbidden.join(", ")}`);
          }

          const summary = {
            name: artifact.name,
            version: artifact.version,
            filename: artifact.filename,
            size: artifact.size,
            unpackedSize: artifact.unpackedSize,
            shasum: artifact.shasum,
            integrity: artifact.integrity,
            fileCount: paths.length,
            files: paths,
          };
          fs.writeFileSync("package-inventory.json", `${JSON.stringify(summary, null, 2)}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `filename=${artifact.filename}\n`);
          console.log(JSON.stringify(summary, null, 2));
          NODE
      - name: Install generated tarball and verify public surface
        shell: bash
        env:
          TARBALL: ${{ steps.pack.outputs.filename }}
        run: |
          install_dir="$(mktemp -d)"
          trap 'rm -rf "$install_dir"' EXIT
          cd "$install_dir"
          npm init --yes >/dev/null
          npm install "$GITHUB_WORKSPACE/$TARBALL" --ignore-scripts --no-audit --no-fund >/dev/null

          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const packagePath = "node_modules/@anirudhsengar/agentify/package.json";
          if (!fs.existsSync(packagePath)) {
            throw new Error(`Scoped package was not installed at ${packagePath}`);
          }
          const installed = JSON.parse(fs.readFileSync(packagePath, "utf8"));
          if (installed.name !== "@anirudhsengar/agentify" || installed.version !== "0.2.1") {
            throw new Error(`Unexpected installed identity: ${installed.name}@${installed.version}`);
          }
          if (installed.bin?.agentify !== "./bin/agentify.js") {
            throw new Error(`Unexpected binary metadata: ${JSON.stringify(installed.bin)}`);
          }
          NODE

          test "$(./node_modules/.bin/agentify --version)" = "0.2.1"
          ./node_modules/.bin/agentify --help > agentify-help.txt
          grep -q 'agentify \[options\]' agentify-help.txt

          node --input-type=module <<'NODE'
          try {
            await import("@anirudhsengar/agentify/dist/cli.js");
            throw new Error("Deep import unexpectedly succeeded");
          } catch (error) {
            if (error?.code !== "ERR_PACKAGE_PATH_NOT_EXPORTED") throw error;
            console.log("Deep import rejected with ERR_PACKAGE_PATH_NOT_EXPORTED");
          }
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: scoped-agentify-0.2.1-node-${{ matrix.node }}
          path: |
            pack-result.json
            package-inventory.json
            ${{ steps.pack.outputs.filename }}
          if-no-files-found: error
          retention-days: 7

  npm-access:
    name: Verify npm scoped-name availability
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@anirudhsengar/agentify
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          registry-url: "https://registry.npmjs.org"
      - name: Verify npm identity and unpublished scoped name
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          account="$(npm whoami)"
          if [[ "$account" != "anirudhsengar" ]]; then
            echo "Expected npm account anirudhsengar, authenticated as $account" >&2
            exit 1
          fi
          echo "Authenticated npm account: $account"

          set +e
          view_output="$(npm view @anirudhsengar/agentify name version owners 2>&1)"
          view_status=$?
          set -e

          if (( view_status == 0 )); then
            echo "Expected @anirudhsengar/agentify to be unpublished, but npm view succeeded" >&2
            exit 1
          fi
          if ! grep -q 'E404' <<<"$view_output"; then
            echo "Expected npm E404 for @anirudhsengar/agentify" >&2
            printf '%s\n' "$view_output" >&2
            exit 1
          fi
          echo "@anirudhsengar/agentify is available for first publication (npm E404)."
