name: Scoped package preparation trigger

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  trigger:
    if: github.event.pull_request.head.ref == 'release/scoped-package-0.2.1' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/scoped-package-0.2.1
      - name: Enable scoped package preparation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/scoped-package-prep.yml')
          text = path.read_text()
          old = "    if: github.actor != 'github-actions[bot]'\n"
          new = "    if: github.event.head_commit.message != 'release: publish Agentify under npm user scope'\n"
          if old not in text:
              raise SystemExit('preparation workflow condition was not found')
          path.write_text(text.replace(old, new, 1))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/scoped-package-prep.yml
          git commit -m "enable scoped package preparation"
          git push origin HEAD:release/scoped-package-0.2.1
