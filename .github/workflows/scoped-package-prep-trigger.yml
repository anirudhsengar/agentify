name: Scoped package preparation trigger

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  trigger:
    if: github.event.pull_request.head.ref == 'release/scoped-package-0.2.1' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/scoped-package-0.2.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: npm
      - name: Apply scoped package preparation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import shlex

          lines = Path('.github/workflows/scoped-package-prep.yml').read_text().splitlines()
          values = {}
          for line in lines:
              for key in ('RELEASE_WORKFLOW_B64', 'RELEASE_SAFETY_B64'):
                  prefix = f'          {key}: '
                  if line.startswith(prefix):
                      values[key] = line[len(prefix):]

          missing = {'RELEASE_WORKFLOW_B64', 'RELEASE_SAFETY_B64'} - values.keys()
          if missing:
              raise SystemExit(f'missing preparation values: {sorted(missing)}')

          start = lines.index('        run: |') + 1
          script_lines = []
          for line in lines[start:]:
              if line and not line.startswith('          '):
                  break
              script_lines.append(line[10:] if line.startswith('          ') else '')

          Path('/tmp/scoped-package-apply.sh').write_text('\n'.join(script_lines) + '\n')
          Path('/tmp/scoped-package-env.sh').write_text(
              '\n'.join(f'export {key}={shlex.quote(value)}' for key, value in values.items()) + '\n'
          )
          PY

          source /tmp/scoped-package-env.sh
          bash /tmp/scoped-package-apply.sh

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .github/workflows/release-publish.yml \
            CHANGELOG.md \
            README.md \
            docs/build-and-package.md \
            docs/release-process.md \
            package-lock.json \
            package.json \
            src/core/package-root.ts \
            tests/maintenance/documentation-invariants.test.ts \
            tests/package/installed-cli-smoke.mjs \
            tests/release-safety.test.ts
          git commit -m "release: publish Agentify under npm user scope"
          git push origin HEAD:release/scoped-package-0.2.1
