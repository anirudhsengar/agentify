name: Scoped package preparation trigger

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  trigger:
    if: github.event.pull_request.head.ref == 'release/scoped-package-0.2.1' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/scoped-package-0.2.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: npm
      - name: Extract scoped package preparation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import shlex

          lines = Path('.github/workflows/scoped-package-prep.yml').read_text().splitlines()
          values = {}
          for line in lines:
              for key in ('RELEASE_WORKFLOW_B64', 'RELEASE_SAFETY_B64'):
                  prefix = f'          {key}: '
                  if line.startswith(prefix):
                      values[key] = line[len(prefix):]

          missing = {'RELEASE_WORKFLOW_B64', 'RELEASE_SAFETY_B64'} - values.keys()
          if missing:
              raise SystemExit(f'missing preparation values: {sorted(missing)}')

          start = lines.index('        run: |') + 1
          script_lines = []
          for line in lines[start:]:
              if line and not line.startswith('          '):
                  break
              script_lines.append(line[10:] if line.startswith('          ') else '')

          script = '\n'.join(script_lines) + '\n'
          install_marker = '\nnpm install --package-lock-only --ignore-scripts\n'
          release_drafter_update = r'''
node --input-type=module <<'NODE'
import fs from "node:fs";
const file = ".github/release-drafter.yml";
const before = fs.readFileSync(file, "utf8");
const oldText = "npm install -g agentify@$RESOLVED_VERSION";
const newText = "npm install -g @anirudhsengar/agentify@$RESOLVED_VERSION";
if (!before.includes(oldText)) {
  throw new Error(`Missing expected unscoped install command in ${file}`);
}
fs.writeFileSync(file, before.replace(oldText, newText));
NODE
'''
          if install_marker not in script:
              raise SystemExit('npm lockfile update marker was not found')
          script = script.replace(install_marker, f'\n{release_drafter_update}{install_marker}', 1)

          old_grep = "if git grep -n -E 'npm install -g agentify|npx agentify|npmjs\\.com/package/agentify|node_modules/agentify|parsed\\.name === \"agentify\"|release-artifact/agentify-\\*\\.tgz|path: agentify-\\*\\.tgz|files: release-artifact/agentify-\\*\\.tgz'; then"
          new_grep = "if git grep -n -E 'npm install -g agentify|npx agentify|npmjs\\.com/package/agentify|node_modules/agentify|parsed\\.name === \"agentify\"|release-artifact/agentify-\\*\\.tgz|path: agentify-\\*\\.tgz|files: release-artifact/agentify-\\*\\.tgz' -- ':!.github/workflows/scoped-package-prep.yml' ':!.github/workflows/scoped-package-prep-trigger.yml' ':!tests/maintenance/documentation-invariants.test.ts'; then"
          if old_grep not in script:
              raise SystemExit('stale-reference grep command was not found')
          script = script.replace(old_grep, new_grep, 1)

          Path('/tmp/scoped-package-apply.sh').write_text(script)
          Path('/tmp/scoped-package-env.sh').write_text(
              '\n'.join(f'export {key}={shlex.quote(value)}' for key, value in values.items()) + '\n'
          )
          PY
      - name: Apply scoped package preparation
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          source /tmp/scoped-package-env.sh
          bash -x /tmp/scoped-package-apply.sh > scoped-package-prep.log 2>&1
      - name: Upload preparation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scoped-package-preparation-log
          path: scoped-package-prep.log
          if-no-files-found: error
          retention-days: 7
      - name: Commit scoped package changes
        if: steps.apply.outcome == 'success'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .github/release-drafter.yml \
            .github/workflows/release-publish.yml \
            CHANGELOG.md \
            README.md \
            docs/build-and-package.md \
            docs/release-process.md \
            package-lock.json \
            package.json \
            src/core/package-root.ts \
            tests/maintenance/documentation-invariants.test.ts \
            tests/package/installed-cli-smoke.mjs \
            tests/release-safety.test.ts
          git commit -m "release: publish Agentify under npm user scope"
          git push origin HEAD:release/scoped-package-0.2.1
      - name: Fail when preparation failed
        if: steps.apply.outcome != 'success'
        run: exit 1
