name: Scoped package worktree

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    name: Apply validated scoped package patch
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Commit validated non-workflow changes
        shell: bash
        run: |
          if [[ "$(node -p 'require("./package.json").name')" == "@anirudhsengar/agentify" ]]; then
            echo "Validated scoped package patch is already applied."
            exit 0
          fi

          base64 --decode .github/scoped-package.patch.gz.b64 | gzip --decompress > /tmp/scoped-package.patch
          git apply --check --exclude=.github/workflows/release-publish.yml /tmp/scoped-package.patch
          git apply --exclude=.github/workflows/release-publish.yml /tmp/scoped-package.patch
          git diff --check

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: publish 0.2.1 under the npm user scope"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
