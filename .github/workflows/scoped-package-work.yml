name: Scoped package worktree

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  npm-access:
    name: Inspect scoped npm publication access
    runs-on: ubuntu-latest
    environment:
      name: npm
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          registry-url: "https://registry.npmjs.org"
      - name: Verify npm identity, availability, and token metadata
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          account="$(npm whoami)"; echo "Authenticated npm account: $account"; test "$account" = "anirudhsengar"
          set +e; npm view @anirudhsengar/agentify name version owners >/tmp/view.out 2>/tmp/view.err; status=$?; set -e
          test "$status" -ne 0; grep -Eq 'E404|404 Not Found' /tmp/view.err; echo "Scoped package availability: unpublished (expected E404)"
          npm token list --json >/tmp/tokens.json
          node --input-type=module -e 'import fs from "node:fs"; const p=JSON.parse(fs.readFileSync("/tmp/tokens.json","utf8")); const a=Array.isArray(p)?p:Object.values(p??{}); const scrub=v=>Array.isArray(v)?v.map(scrub):v&&typeof v==="object"?Object.fromEntries(Object.entries(v).filter(([k])=>!/token|secret|credential|password|auth|key/i.test(k)).map(([k,x])=>[k,scrub(x)])):v; console.log("SAFE_TOKEN_METADATA="+JSON.stringify(a.map(scrub)))'
