name: issue-15-unused-code

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/issue-15-unused-code' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'
          cache: npm
      - run: npm ci
      - name: Apply TypeScript unused-code fixes
        run: node scripts/fix-unused-typescript.mjs | tee unused-code-fixes.log
      - name: Verify generated diff
        run: git diff --check
      - name: Typecheck with unused-code checks
        id: typecheck
        continue-on-error: true
        run: npm run typecheck > unused-code-typecheck.log 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unused-code-typecheck-log
          path: unused-code-typecheck.log
          retention-days: 1
      - name: Stop on typecheck failure
        if: steps.typecheck.outcome == 'failure'
        run: |
          cat unused-code-typecheck.log
          exit 1
      - name: Full test suite
        run: npm run test:all
      - name: Installed package smoke
        run: npm run test:package
      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high
      - name: Commit unused-code cleanup
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src tests tsconfig.json CHANGELOG.md
          git diff --cached --check
          git commit -m "chore: enable TypeScript unused-code checks"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
