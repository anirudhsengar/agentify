name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  tests:
    name: Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22.19.0", "24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run test:all

  dependency-audit:
    name: Production dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high

  package-smoke:
    name: Modernization parity and packed package smoke
    if: ${{ always() }}
    needs: [typecheck, tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: CLI parity
        run: npm run test:parity:cli
      - name: Generated render inventory
        if: ${{ always() }}
        env:
          AGENTIFY_PARITY_CASE: render
        run: npm run test:parity:generated
      - name: User-owned and alongside apply
        if: ${{ always() }}
        env:
          AGENTIFY_PARITY_CASE: apply-user
        run: npm run test:parity:generated
      - name: Repeated deterministic apply
        if: ${{ always() }}
        env:
          AGENTIFY_PARITY_CASE: apply-repeat
        run: npm run test:parity:generated
      - name: Managed canonical update
        if: ${{ always() }}
        env:
          AGENTIFY_PARITY_CASE: apply-managed
        run: npm run test:parity:generated
      - name: Generated required-conflict atomicity
        if: ${{ always() }}
        env:
          AGENTIFY_PARITY_CASE: conflict
        run: npm run test:parity:generated
      - name: Generated symlink protection
        if: ${{ always() }}
        env:
          AGENTIFY_PARITY_CASE: symlink
        run: npm run test:parity:generated
      - name: State-directory parity
        if: ${{ always() }}
        run: npm run test:parity:state
      - name: Packed package smoke
        if: ${{ always() }}
        run: npm run test:package
