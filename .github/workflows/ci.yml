name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  tests:
    name: Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22.19.0", "24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Run test:all and capture diagnostics
        id: test_all
        shell: bash
        run: |
          set +e
          npm run test:all > test-all.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        if: steps.test_all.outputs.status != '0'
        with:
          name: issue28-test-all-${{ matrix.node }}
          path: test-all.log
      - name: Preserve test conclusion
        if: steps.test_all.outputs.status != '0'
        shell: bash
        run: |
          cat test-all.log
          exit 1

  dependency-audit:
    name: Production dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high

  package-smoke:
    name: Modernization validation and packed package smoke
    needs: [typecheck, tests, dependency-audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: npm
      - run: npm ci
      - run: npm run test:parity
      - run: npm run test:package
      - run: npm run test:maintenance
      - run: npm run test:generated-output
      - run: npm run test:security-redteam
