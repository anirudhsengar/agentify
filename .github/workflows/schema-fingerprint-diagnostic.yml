name: schema-fingerprint-diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  schema-fingerprints:
    runs-on: ubuntu-latest
    steps:
      - name: Print schema fingerprints
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone -q --depth=1 --branch "$GITHUB_HEAD_REF" "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          npm ci --silent
          npx tsx tests/audit/schema-fingerprint-diagnostic.ts
