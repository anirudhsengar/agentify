name: schema-fingerprint-diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  schema-fingerprints:
    runs-on: ubuntu-latest
    steps:
      - name: Compare schema serialization
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone -q --depth=1 --branch "$GITHUB_HEAD_REF" "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" branch
          git clone -q --depth=1 --branch main "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" baseline
          (cd branch && npm ci --silent && npx tsx -e 'import { CodebaseMapSchema } from "./src/core/audit/schema.ts"; process.stdout.write(JSON.stringify(CodebaseMapSchema))' > /tmp/branch-schema.json)
          (cd baseline && npm ci --silent && npx tsx -e 'import { CodebaseMapSchema } from "./src/core/audit/schema.ts"; process.stdout.write(JSON.stringify(CodebaseMapSchema))' > /tmp/baseline-schema.json)
          python3 - <<'PY'
          from pathlib import Path
          baseline = Path('/tmp/baseline-schema.json').read_text()
          branch = Path('/tmp/branch-schema.json').read_text()
          for index, (expected, actual) in enumerate(zip(baseline, branch)):
              if expected != actual:
                  start = max(0, index - 120)
                  end = index + 120
                  print(f'first_difference={index}')
                  print(f'baseline={baseline[start:end]!r}')
                  print(f'branch={branch[start:end]!r}')
                  break
          else:
              print(f'common_prefix={min(len(baseline), len(branch))}')
          print(f'baseline_length={len(baseline)} branch_length={len(branch)}')
          PY
