name: phase-10-unused-probe

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  probe:
    if: github.event.pull_request.head.ref == 'agent/phase-10-maintainability'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'
          cache: npm
      - run: npm ci
      - name: Probe noUnusedLocals and noUnusedParameters
        id: unused
        continue-on-error: true
        run: npx tsc --noEmit --noUnusedLocals --noUnusedParameters > unused-typescript.log 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase-10-unused-typescript-log
          path: unused-typescript.log
          retention-days: 1
      - name: Report probe result
        if: steps.unused.outcome == 'failure'
        run: exit 1
