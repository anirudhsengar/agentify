name: harden-explorers

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/security-execution-policy' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node .github/scripts/harden-explorers.mjs
      - name: Commit explorer hardening
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/core/audit/spawn-explorer-tool.ts
          git diff --cached --check
          git commit -m "feat(security): make explorer sessions strictly read-only"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
