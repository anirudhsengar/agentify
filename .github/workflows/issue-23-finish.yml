name: Finish Issue 23 shared-primitives rewiring

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  finish-rewiring:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/23-shared-primitives
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: npm

      - name: Apply remaining dependency-neutral rewires
        shell: bash
        run: |
          python <<'PY'
          import re
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: expected one match, found {count}")
              return text.replace(old, new, 1)

          def sub_once(text: str, pattern: str, replacement: str, label: str) -> str:
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise RuntimeError(f"{label}: expected one match, found {count}")
              return updated

          path = Path("src/core/run-agentify.ts")
          text = path.read_text()
          text = replace_once(
              text,
              'import { exportAgenticSurface, addMarkdownManagedMarker } from "./artifact-exporters.ts";\n',
              'import { exportAgenticSurface } from "./artifact-exporters.ts";\n'
              'import { isFeatureAgentFilename } from "./artifacts/agent-file-conventions.ts";\n'
              'import {\n'
              '  GENERATED_SURFACE_PATHS,\n'
              '  normalizeArtifactPath,\n'
              '} from "./artifacts/generated-surface.ts";\n'
              'import { addMarkdownManagedMarker } from "./artifacts/managed-markers.ts";\n'
              'import { readPackageVersion } from "./package-version.ts";\n',
              "run-agentify primitive imports",
          )
          text = sub_once(
              text,
              r'const RESERVED_AGENT_NAMES = new Set\(\[\n.*?\n\]\);\n\nconst GENERATED_SURFACE_PATHS = \[\n.*?\n\] as const;\n\n',
              '',
              "run-agentify duplicate constants",
          )
          text = sub_once(
              text,
              r'function toRel\(cwd: string, filePath: string\): string \{\n  return path\.relative\(cwd, filePath\)\.split\(path\.sep\)\.join\("/"\);\n\}',
              'function toRel(cwd: string, filePath: string): string {\n  return normalizeArtifactPath(path.relative(cwd, filePath));\n}',
              "run-agentify path normalization",
          )
          text = sub_once(
              text,
              r'    if \(!entry\.isFile\(\) \|\| !entry\.name\.endsWith\("\.md"\)\) continue;\n    if \(RESERVED_AGENT_NAMES\.has\(entry\.name\)\) continue;',
              '    if (!entry.isFile() || !isFeatureAgentFilename(entry.name)) continue;',
              "run-agentify mirror filter",
          )
          text = sub_once(
              text,
              r'      if \(entry\.endsWith\("\.md"\) && !RESERVED_AGENT_NAMES\.has\(entry\)\) \{\n        featureAgentsWritten \+= 1;\n      \}',
              '      if (isFeatureAgentFilename(entry)) {\n        featureAgentsWritten += 1;\n      }',
              "run-agentify feature count",
          )
          text = sub_once(
              text,
              r'function loadAgentifyVersion\(\): string \{\n  try \{\n    const raw = fs\.readFileSync\(path\.join\(packageRoot\(\), "package\.json"\), "utf-8"\);\n    const parsed = JSON\.parse\(raw\) as \{ version\?: string \};\n    return parsed\.version \?\? "unknown";\n  \} catch \{\n    return "unknown";\n  \}\n\}\n\n',
              '',
              "run-agentify package version duplicate",
          )
          text = text.replace("loadAgentifyVersion()", "readPackageVersion(packageRoot())")
          if "RESERVED_AGENT_NAMES" in text or "loadAgentifyVersion" in text:
              raise RuntimeError("run-agentify retained duplicate primitives")
          path.write_text(text)

          path = Path("src/core/artifacts/renderers.ts")
          text = path.read_text()
          text = replace_once(
              text,
              'import { AGENTIFY_MANAGED_MARKERS, addMarkdownManagedMarker } from "../artifact-exporters.ts";\n',
              'import {\n'
              '  AGENTIFY_MANAGED_MARKERS,\n'
              '  addMarkdownManagedMarker,\n'
              '} from "./managed-markers.ts";\n'
              'import { normalizeArtifactPath } from "./generated-surface.ts";\n',
              "renderer primitive imports",
          )
          text = sub_once(
              text,
              r'function normalizePath\(relativePath: string\): string \{\n  return relativePath\.replace\(/\\\\/g, "/"\)\.replace\(/\^\\\.\\/\+/, ""\);\n\}\n\n',
              '',
              "renderer path duplicate",
          )
          text = text.replace("normalizePath", "normalizeArtifactPath")
          if "../artifact-exporters.ts" in text or "function normalizePath" in text:
              raise RuntimeError("renderer retained reversed primitive dependency")
          path.write_text(text)

          path = Path("src/core/greenfield-artifacts.ts")
          text = path.read_text()
          text = replace_once(
              text,
              '} from "./artifact-exporters.ts";\n',
              '} from "./artifacts/managed-markers.ts";\n',
              "greenfield marker import",
          )
          path.write_text(text)

          Path(".github/workflows/issue-23-refactor.yml").unlink()
          Path(".github/workflows/issue-23-finish.yml").unlink()
          PY

      - run: npm ci
      - run: npm run typecheck
      - run: git diff --check

      - name: Commit rewiring
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: rewire shared primitive consumers"
          git push origin HEAD:refactor/23-shared-primitives
