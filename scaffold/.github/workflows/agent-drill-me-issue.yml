name: Agent Drill-Me Issue

# Post-launch drilling happens through a GitHub issue labeled `agent:drill-me`
# instead of a terminal session, with the agent deciding unilaterally whether
# to keep interviewing, split into child issues, or run /to-prd, /to-plan,
# /to-issues. This workflow is what does that work, every time someone opens
# such an issue or comments on it.
#
# This replaces `agent-drill-me-discussion.yml` (which listened to GitHub
# Discussions). The intake shape changed from "labeled Discussion in the
# Drilling category" to "labeled issue with `agent:drill-me`"; the runtime
# mechanics (one transition per event, marker-based resumption, branch per
# thread, role-gated writes) are unchanged.
#
# Repo file changes (GOALS.md, docs/goals/*.md, PRDs, plans) still go
# through a PR — same posture as agent-implement.yml. Posting replies
# happens directly via `gh issue comment`, which uses the issue's REST API.

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

jobs:
  drill:
    if: contains(github.event.issue.labels.*.name, 'agent:drill-me')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: agent-drill-me-issue-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write

    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ISSUE_TITLE: ${{ github.event.issue.title }}
      EVENT_NAME: ${{ github.event_name }}
      EVENT_ID: ${{ github.event.comment.node_id || github.event.issue.node_id }}
      COMMENT_AUTHOR: ${{ github.event.comment.user.login || github.event.issue.user.login }}
      AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association || github.event.issue.author_association }}
      GH_TOKEN: ${{ secrets.AGENT_PAT }}
      GH_REPO: ${{ github.repository }}
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}

    steps:
      - name: Authorize actor and skip duplicate events
        id: guard
        run: |
          set -euo pipefail
          : "${GH_TOKEN:?AGENT_PAT is required — see SETUP.md}"
          bot_login="${{ vars.AGENT_BOT_LOGIN }}"
          if [ "$COMMENT_AUTHOR" = "github-actions[bot]" ] || { [ -n "$bot_login" ] && [ "$COMMENT_AUTHOR" = "$bot_login" ]; }; then
            echo "Comment author ($COMMENT_AUTHOR) is this bot — skipping to avoid a reply loop."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$AUTHOR_ASSOCIATION" in
            OWNER|MEMBER|COLLABORATOR) ;;
            *)
              echo "Actor $COMMENT_AUTHOR has association $AUTHOR_ASSOCIATION — refusing a write-capable agent run."
              echo "proceed=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          marker="agentify-event:${EVENT_ID}"
          already_processed=$(gh api "repos/${REPO_OWNER}/${REPO_NAME}/issues/${ISSUE_NUMBER}/comments" \
            --paginate \
            --jq "[.[] | select(.body | contains(\"$marker\"))] | length")
          if [ "$already_processed" -gt 0 ]; then
            echo "Event $EVENT_ID already has a completion marker — skipping duplicate delivery."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - name: Checkout default branch
        if: steps.guard.outputs.proceed == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Compute branch name
        if: steps.guard.outputs.proceed == 'true'
        id: branch
        run: |
          slug=$(echo "$ISSUE_TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g' \
            | cut -c1-50)
          branch="agent/drill-me-${ISSUE_NUMBER}-${slug}"
          echo "name=$branch" >> "$GITHUB_OUTPUT"

      - name: Create or continue drill branch
        if: steps.guard.outputs.proceed == 'true'
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          git config user.name "pi-agent[bot]"
          git config user.email "pi-agent[bot]@users.noreply.github.com"
          git fetch origin "$BRANCH" || true
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

      - name: Checkout trusted runtime from the default branch
        if: steps.guard.outputs.proceed == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: .agentify-runtime
          persist-credentials: false

      - name: Exclude trusted runtime checkout from drill commits
        if: steps.guard.outputs.proceed == 'true'
        run: echo "/.agentify-runtime/" >> .git/info/exclude

      - name: Setup Pi
        if: steps.guard.outputs.proceed == 'true'
        uses: ./.agentify-runtime/.github/actions/setup-pi
        with:
          version: ${{ vars.PI_VERSION }}

      - name: Render drill-issue prompt
        if: steps.guard.outputs.proceed == 'true'
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
        run: envsubst < .agentify-runtime/.github/agent-prompts/drill-me-issue.md > "${RUNNER_TEMP}/drill-me-prompt.md"

      - name: Run Pi — continue drilling
        if: steps.guard.outputs.proceed == 'true'
        id: pi_drill_me
        uses: ./.agentify-runtime/.github/actions/run-pi
        with:
          prompt-file: ${{ runner.temp }}/drill-me-prompt.md
          api-key: ${{ secrets.PI_API_KEY }}
          provider: ${{ vars.PI_PROVIDER || 'anthropic' }}
          model: ${{ vars.PI_MODEL }}
          thinking: ${{ vars.PI_THINKING || 'high' }}

      - name: Push branch and open PR if repo files changed
        if: steps.guard.outputs.proceed == 'true' && success()
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
          AGENT_PAT: ${{ secrets.AGENT_PAT }}
        run: |
          set -euo pipefail
          base_ref="${{ github.event.repository.default_branch }}"
          commits_ahead=$(git rev-list --count "origin/${base_ref}..HEAD")
          if [ "$commits_ahead" -eq 0 ]; then
            echo "No repo file changes this turn — nothing to push."
            exit 0
          fi

          : "${AGENT_PAT:?AGENT_PAT is required — see SETUP.md}"
          GH_TOKEN="$AGENT_PAT" gh auth setup-git
          git push origin "$BRANCH"

          existing=$(gh pr list --state open --head "$BRANCH" --json number --jq 'length')
          if [ "$existing" -gt 0 ]; then
            echo "PR already open for $BRANCH — pushed update, no new PR needed."
            exit 0
          fi

          GH_TOKEN="$AGENT_PAT" gh pr create --draft --base "$base_ref" --head "$BRANCH" \
            --title "Drill issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}" \
            --body "Spawned from issue #${ISSUE_NUMBER} by \`agent-drill-me-issue.yml\`."

      - name: Report failure on the issue
        if: steps.guard.outputs.proceed == 'true' && failure()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --body "Run failed — see ${RUN_URL}. Comment again to retry." || true
