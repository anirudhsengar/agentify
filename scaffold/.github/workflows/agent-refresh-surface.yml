name: Agent Refresh Surface

# Keeps the agentic surface current (docs/adr/0012). On every push to the default
# branch, re-audits the feature areas the merge touched and re-syncs the experts, then
# opens a PR with the refreshed AGENTS.md / feature agents / conditional_docs / expert
# YAMLs. Repo-file changes go through a PR like every other agent change.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: agent-refresh-surface
  cancel-in-progress: true

jobs:
  refresh:
    # Skip pushes made by the refresh branch itself to avoid a loop.
    if: "${{ github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'chore(agentify): refresh agentic surface') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
    env:
      BASE_REF: ${{ github.event.repository.default_branch }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BASE_REF }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Checkout trusted runtime from the default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BASE_REF }}
          path: .agentify-runtime
          persist-credentials: false

      - name: Exclude trusted runtime checkout from refresh commits
        run: echo "/.agentify-runtime/" >> .git/info/exclude

      - name: Compute refresh branch name
        id: branch
        run: echo "name=agent/refresh-surface-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Create branch
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          git config user.name "pi-agent[bot]"
          git config user.email "pi-agent[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

      - name: Setup Pi
        uses: ./.agentify-runtime/.github/actions/setup-pi
        with:
          version: ${{ vars.PI_VERSION }}

      - name: Render refresh prompt
        run: envsubst < .agentify-runtime/.github/agent-prompts/refresh-surface.md > "${RUNNER_TEMP}/refresh-prompt.md"

      - name: Run Pi — refresh surface
        uses: ./.agentify-runtime/.github/actions/run-pi
        with:
          prompt-file: ${{ runner.temp }}/refresh-prompt.md
          api-key: ${{ secrets.PI_API_KEY }}
          provider: ${{ vars.PI_PROVIDER || 'anthropic' }}
          model: ${{ vars.PI_MODEL }}
          thinking: ${{ vars.PI_THINKING || 'high' }}

      - name: Open PR if the surface changed
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
          AGENT_PAT: ${{ secrets.AGENT_PAT }}
        run: |
          set -euo pipefail
          if git diff --quiet && git diff --cached --quiet; then
            echo "Surface already current — nothing to refresh."
            exit 0
          fi
          : "${AGENT_PAT:?AGENT_PAT is required — see SETUP.md}"
          git add -A
          git commit -m "chore(agentify): refresh agentic surface for ${GITHUB_SHA::8}"
          GH_TOKEN="$AGENT_PAT" gh auth setup-git
          git push --force origin "$BRANCH"
          GH_TOKEN="$AGENT_PAT" gh pr create \
            --base "$BASE_REF" --head "$BRANCH" \
            --title "chore: refresh agentic surface" \
            --body "Automated delta re-audit after merge (see docs/adr/0012). Review the updated AGENTS.md / feature agents / conditional_docs / expert YAMLs, then merge." \
            --label "agent:review"
