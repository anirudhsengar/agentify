name: Agent Implement (PR)

# Mirrors agent-implement.yml but for agent:implement applied directly to a
# PR (the path agent-review.yml's request_changes verdict takes) — issues
# and PRs are different webhook event types even though they share the
# agent:* label vocabulary, so this needs its own trigger.

on:
  # See agent-review.yml for why pull_request_target rather than pull_request.
  pull_request_target:
    types: [labeled]

jobs:
  implement-pr:
    if: >-
      github.event.label.name == 'agent:implement' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'agent/')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Shared with agent-review.yml — both push to the PR branch.
    concurrency:
      group: agent-mutate-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      BRANCH: ${{ github.event.pull_request.head.ref }}
      BRANCH_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      BASE_REF: ${{ github.event.pull_request.base.ref }}
      PR_STATE: ${{ github.event.pull_request.state }}
      PR_MERGED: ${{ github.event.pull_request.merged }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Pre-flight — refuse if PR is closed or merged
        id: state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$PR_STATE" != "open" ] || [ "$PR_MERGED" = "true" ]; then
            gh pr edit "$PR_NUMBER" --remove-label "agent:implement" || true
            gh pr comment "$PR_NUMBER" --body "Refused to run \`agent:implement\`: PR is not open."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Pre-flight — refuse if there is nothing to act on
        if: steps.state.outputs.proceed == 'true'
        id: inputs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          top_level=$(gh pr view "$PR_NUMBER" --json comments --jq '.comments | length')
          reviews=$(gh api "repos/${GH_REPO}/pulls/${PR_NUMBER}/reviews" --jq 'length')
          total=$((top_level + reviews))
          if [ "$total" -eq 0 ]; then
            gh pr edit "$PR_NUMBER" --remove-label "agent:implement" || true
            gh pr comment "$PR_NUMBER" --body "Refused to run \`agent:implement\`: no PR comments or reviews to act on."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Transition labels — remove trigger + blocked, add in-progress
        if: steps.state.outputs.proceed == 'true' && steps.inputs.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "$PR_NUMBER" --remove-label "agent:implement" || true
          gh pr edit "$PR_NUMBER" --remove-label "agent:approved" || true
          gh pr edit "$PR_NUMBER" --remove-label "agent:blocked" || true
          gh pr edit "$PR_NUMBER" --add-label "agent:in-progress"

      - name: Checkout PR branch
        if: steps.state.outputs.proceed == 'true' && steps.inputs.outputs.proceed == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Checkout trusted runtime from the PR base
        if: steps.state.outputs.proceed == 'true' && steps.inputs.outputs.proceed == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: .agentify-runtime
          persist-credentials: false

      - name: Exclude trusted runtime checkout from PR commits
        if: steps.state.outputs.proceed == 'true' && steps.inputs.outputs.proceed == 'true'
        run: echo "/.agentify-runtime/" >> .git/info/exclude

      - name: Ensure base ref is available for diffing
        if: steps.state.outputs.proceed == 'true' && steps.inputs.outputs.proceed == 'true'
        run: |
          git fetch origin "$BASE_REF":"$BASE_REF" || git fetch origin "$BASE_REF"
          git checkout "$BRANCH" 2>/dev/null || git checkout -B "$BRANCH"
          git config user.name "pi-agent[bot]"
          git config user.email "pi-agent[bot]@users.noreply.github.com"

      - name: Capture pre-run HEAD
        if: steps.state.outputs.proceed == 'true' && steps.inputs.outputs.proceed == 'true'
        id: pre
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Capture PR context for a credential-free agent run
        if: steps.state.outputs.proceed == 'true' && steps.inputs.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash .agentify-runtime/.github/scripts/capture-pr-context.sh \
            "$PR_NUMBER" "$GH_REPO" "${RUNNER_TEMP}/pr-context"

      - name: Setup Pi
        if: steps.state.outputs.proceed == 'true' && steps.inputs.outputs.proceed == 'true'
        uses: ./.agentify-runtime/.github/actions/setup-pi
        with:
          version: ${{ vars.PI_VERSION }}

      - name: Render implement-pr prompt
        if: steps.state.outputs.proceed == 'true' && steps.inputs.outputs.proceed == 'true'
        env:
          PR_CONTEXT_DIR: ${{ runner.temp }}/pr-context
        run: envsubst < .agentify-runtime/.github/agent-prompts/implement-pr.md > "${RUNNER_TEMP}/implement-pr-prompt.md"

      - name: Run Pi — implement PR feedback
        if: steps.state.outputs.proceed == 'true' && steps.inputs.outputs.proceed == 'true'
        id: pi_implement_pr
        uses: ./.agentify-runtime/.github/actions/run-pi
        with:
          prompt-file: ${{ runner.temp }}/implement-pr-prompt.md
          api-key: ${{ secrets.PI_API_KEY }}
          provider: ${{ vars.PI_PROVIDER || 'anthropic' }}
          model: ${{ vars.PI_MODEL }}
          thinking: ${{ vars.PI_THINKING || 'high' }}

      - name: Push branch (abort cleanly if non-fast-forward)
        if: steps.state.outputs.proceed == 'true' && steps.inputs.outputs.proceed == 'true' && success()
        id: push
        env:
          AGENT_PAT: ${{ secrets.AGENT_PAT }}
        run: |
          if [ "$(git rev-parse HEAD)" = "${{ steps.pre.outputs.sha }}" ]; then
            echo "No commits this run — skipping push and comment."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          : "${AGENT_PAT:?AGENT_PAT is required — see SETUP.md}"
          GH_TOKEN="$AGENT_PAT" gh auth setup-git
          set +e
          git push --force-with-lease="refs/heads/$BRANCH:$BRANCH_HEAD_SHA" origin "$BRANCH" 2> push_err.txt
          status=$?
          set -e
          if [ $status -ne 0 ]; then
            if grep -qiE "non-fast-forward|rejected|fetch first|stale info" push_err.txt; then
              echo "Branch advanced during implement run." > "${RUNNER_TEMP}/failure_reason.txt"
              cat push_err.txt
              exit 1
            fi
            cat push_err.txt
            exit $status
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Post Pi's final reply as a PR comment
        if: steps.state.outputs.proceed == 'true' && steps.inputs.outputs.proceed == 'true' && success()
        env:
          TRANSCRIPT: ${{ steps.pi_implement_pr.outputs.output-file }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr comment "$PR_NUMBER" --body-file "$TRANSCRIPT"

      - name: Re-queue automated review
        if: steps.state.outputs.proceed == 'true' && steps.inputs.outputs.proceed == 'true' && success() && steps.push.outputs.changed == 'true'
        env:
          AGENT_PAT: ${{ secrets.AGENT_PAT }}
        run: |
          set -euo pipefail
          : "${AGENT_PAT:?AGENT_PAT is required — see SETUP.md}"
          GH_TOKEN="$AGENT_PAT" gh pr edit "$PR_NUMBER" --add-label "agent:review"

      - name: Mark blocked on failure
        if: steps.state.outputs.proceed == 'true' && steps.inputs.outputs.proceed == 'true' && failure()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reason="(no reason file written — check workflow logs)"
          if [ -f "${RUNNER_TEMP}/failure_reason.txt" ]; then
            reason=$(cat "${RUNNER_TEMP}/failure_reason.txt")
          fi
          gh pr edit "$PR_NUMBER" --add-label "agent:blocked" || true
          gh pr comment "$PR_NUMBER" --body "$(cat <<EOF
          \`agent:implement\` run on this PR failed.

          **Reason:** $reason

          **Workflow run:** $RUN_URL

          Re-add \`agent:implement\` to retry.
          EOF
          )"

      - name: Always remove in-progress label
        if: always() && steps.state.outputs.proceed == 'true' && steps.inputs.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr edit "$PR_NUMBER" --remove-label "agent:in-progress" || true
